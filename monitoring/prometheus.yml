global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # LicenseFlow application metrics
  - job_name: "licenseflow"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["licenseflow:3000"]
        labels:
          environment: "production"
    # If behind auth, add bearer token
    # authorization:
    #   credentials: "<metrics-token>"

  # PostgreSQL metrics (via postgres_exporter)
  - job_name: "postgresql"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          environment: "production"

  # Redis metrics (via redis_exporter)
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          environment: "production"

  # Node/container metrics
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          environment: "production"
