apiVersion: v2
name: licenseflow
description: LicenseFlow Self-Hosted Edition - Enterprise License Management
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - license-management
  - software-licensing
  - enterprise
  - saas
home: https://licenseflow.io
sources:
  - https://github.com/licenseflow/licenseflow
maintainers:
  - name: LicenseFlow Team
    email: support@licenseflow.io
dependencies:
  - name: postgresql
    version: "~13.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "~18.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
