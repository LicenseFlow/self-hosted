{{- if not .Values.secrets.existingSecret }}
{{- if not .Values.secrets.jwtSecret }}
{{- fail "ERROR: secrets.jwtSecret is required. Set via --set secrets.jwtSecret=YOUR_SECRET or use secrets.existingSecret to reference a pre-created Secret." }}
{{- end }}
{{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.password) }}
{{- fail "ERROR: postgresql.auth.password is required. Set via --set postgresql.auth.password=YOUR_PASSWORD." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "licenseflow.fullname" . }}
  labels:
    {{- include "licenseflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  DATABASE_URL: {{ include "licenseflow.databaseUrl" . | quote }}
  {{- if .Values.secrets.stripeSecretKey }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeWebhookSecret }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpHost }}
  SMTP_HOST: {{ .Values.secrets.smtpHost | quote }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASS: {{ .Values.secrets.smtpPass | quote }}
  SMTP_FROM: {{ .Values.secrets.smtpFrom | quote }}
  {{- end }}
{{- end }}
