# LicenseFlow Self-Hosted Edition
# Complete stack with PostgreSQL, Redis, and LicenseFlow
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: licenseflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-licenseflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-licenseflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-licenseflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - licenseflow-network

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: licenseflow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - licenseflow-network

  # LicenseFlow Application
  licenseflow:
    build:
      context: ../..
      dockerfile: self-hosted/docker/Dockerfile
    container_name: licenseflow-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-licenseflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-licenseflow}
      
      # Auth & Security
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-min-32-chars}
      
      # Supabase compatibility (optional for full Supabase features)
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Stripe (optional)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      
      # Email (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      
      # Application
      APP_URL: ${APP_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:80"
    volumes:
      - ./logs:/var/log/nginx
    networks:
      - licenseflow-network

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: licenseflow-adminer
    restart: unless-stopped
    profiles:
      - tools
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    networks:
      - licenseflow-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  licenseflow-network:
    driver: bridge
