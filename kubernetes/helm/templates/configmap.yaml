apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "licenseflow.fullname" . }}-config
  labels:
    {{- include "licenseflow.labels" . | nindent 4 }}
data:
  APP_URL: {{ .Values.config.appUrl | quote }}
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  REDIS_URL: {{ include "licenseflow.redisUrl" . | quote }}
  BACKUP_ENABLED: {{ .Values.backup.enabled | quote }}
  {{- if .Values.backup.enabled }}
  BACKUP_S3_BUCKET: {{ .Values.backup.s3.bucket | quote }}
  BACKUP_S3_REGION: {{ .Values.backup.s3.region | quote }}
  BACKUP_RETENTION_DAYS: {{ .Values.backup.retention | quote }}
  {{- end }}
